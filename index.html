<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE H Brand | 마감재 리스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --bg: #1a1410;
  --surface: #231e18;
  --surface2: #2d2620;
  --border: #3d3530;
  --gold: #c9a96e;
  --gold-light: #e4c99a;
  --cream: #f5f0e8;
  --text: #e8ddd0;
  --text-muted: #8a7968;
  --red: #c0392b;
  --green: #2ecc71;
  --sidebar-w: 220px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
#sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 20px 16px 14px; border-bottom: 1px solid var(--border); }
.brand-logo { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gold); letter-spacing: 1px; }
.brand-sub  { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 10px 0; }
.sidebar-nav::-webkit-scrollbar { width: 3px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.year-block { margin-bottom: 2px; }
.year-label { display: flex; align-items: center; justify-content: space-between; padding: 7px 16px; cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: var(--gold); text-transform: uppercase; transition: background 0.15s; }
.year-label:hover { background: rgba(201,169,110,0.06); }
.year-label .arrow { font-size: 9px; transition: transform 0.2s; }
.year-label.open .arrow { transform: rotate(90deg); }
.month-list { display: none; }
.month-list.open { display: block; }
.month-item { padding: 6px 16px 6px 30px; cursor: pointer; font-size: 13px; color: var(--text-muted); transition: all 0.15s; border-left: 2px solid transparent; margin-left: 16px; display: flex; align-items: center; gap: 6px; }
.month-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.month-item.active { color: var(--gold-light); border-left-color: var(--gold); background: rgba(201,169,110,0.08); font-weight: 500; }
.has-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--border); }
.btn-add-year { width: 100%; padding: 7px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: all 0.2s; background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.3); color: var(--gold); }
.btn-add-year:hover { background: rgba(201,169,110,0.18); }

/* ── MAIN ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); gap: 16px; flex-shrink: 0; }
.topbar-left { display: flex; flex-direction: column; gap: 2px; }
.topbar-title { font-size: 11px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }
.topbar-sub { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--cream); }
.topbar-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.sync-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); padding: 5px 10px; background: var(--surface2); border-radius: 4px; white-space: nowrap; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; flex-shrink: 0; }
.sync-dot.saving { background: #f39c12; animation: blink 0.7s infinite; }
.sync-dot.ok  { background: var(--green); }
.sync-dot.err { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.guser-badge { display: flex; align-items: center; gap: 7px; padding: 5px 10px; background: var(--surface2); border-radius: 4px; font-size: 11px; color: var(--text-muted); cursor: pointer; transition: background 0.2s; }
.guser-badge:hover { background: var(--border); }
.gavatar { width: 20px; height: 20px; border-radius: 50%; background: var(--border); object-fit: cover; }
.btn { padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-gold { background: var(--gold); color: #1a1410; }
.btn-gold:hover:not(:disabled) { background: var(--gold-light); }
.btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
.btn-outline:hover:not(:disabled) { background: rgba(201,169,110,0.12); }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

/* ── CONTENT ── */
#content-area { flex: 1; overflow-y: auto; padding: 24px; }
#content-area::-webkit-scrollbar { width: 6px; }
#content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── LOGIN ── */
#login-screen { display: flex; align-items: center; justify-content: center; height: 100%; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 44px 52px; max-width: 400px; width: 100%; text-align: center; }
.login-logo { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); margin-bottom: 6px; }
.login-sub  { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
.login-desc { font-size: 13px; color: var(--text-muted); line-height: 1.8; margin-bottom: 28px; }
#g-signin-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: white; color: #3c4043; border: 1px solid #dadce0; border-radius: 6px; padding: 11px 20px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; cursor: pointer; width: 100%; transition: box-shadow 0.2s; }
#g-signin-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

/* ── 현장 목록 ── */
#site-list-screen { display: none; }
.list-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 20px; }
.list-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--cream); }
.list-sub   { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.site-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; }
.site-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 18px 16px; cursor: pointer; transition: all 0.2s; position: relative; }
.site-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.site-card-badge { position: absolute; top: 14px; right: 14px; background: rgba(201,169,110,0.15); color: var(--gold); font-size: 10px; padding: 3px 8px; border-radius: 20px; }
.site-card-name { font-size: 15px; font-weight: 700; color: var(--cream); margin-bottom: 6px; padding-right: 50px; }
.site-card-addr { font-size: 11px; color: var(--text-muted); }
.site-card-date { font-size: 11px; color: var(--text-muted); margin-top: 10px; }
.site-card-del { position: absolute; bottom: 12px; right: 12px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 13px; padding: 4px 6px; border-radius: 3px; transition: all 0.15s; opacity: 0; }
.site-card:hover .site-card-del { opacity: 1; }
.site-card-del:hover { color: var(--red); background: rgba(192,57,43,0.1); }
.site-card-add { background: transparent; border: 1px dashed var(--border); border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text-muted); font-size: 13px; min-height: 100px; }
.site-card-add:hover { border-color: var(--gold); color: var(--gold); }

.state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 240px; color: var(--text-muted); gap: 10px; }
.state-box .icon { font-size: 32px; }
.state-box p { font-size: 13px; }

/* ── 편집 화면 ── */
#edit-screen { display: none; }
#pdf-area { background: var(--surface); border-radius: 8px; border: 1px solid var(--border); padding: 20px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { border-bottom: 2px solid var(--gold); }
th { text-align: left; padding: 10px 8px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); }
td { border-bottom: 1px solid var(--border); padding: 2px 3px; vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,0.015); }
td input { width: 100%; background: transparent; border: none; outline: none; padding: 7px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); border-radius: 3px; transition: background 0.15s; }
td input:focus { background: rgba(201,169,110,0.06); }
td input::placeholder { color: #5a5040; }
.row-num { color: var(--text-muted); font-size: 11px; text-align: center; padding: 7px 6px; user-select: none; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 4px 8px; border-radius: 3px; transition: all 0.15s; line-height: 1; }
.del-btn:hover { color: var(--red); background: rgba(192,57,43,0.1); }
.drag-handle { cursor: grab; color: var(--text-muted); font-size: 14px; text-align: center; user-select: none; padding: 0 4px; opacity: 0.35; transition: opacity 0.15s; }
.drag-handle:active { cursor: grabbing; }
tr:hover .drag-handle { opacity: 0.9; color: var(--gold); }
#table-body tr.dragging { opacity: 0.35; background: rgba(201,169,110,0.04); }
#table-body tr.drag-over-top { box-shadow: 0 -2px 0 var(--gold); }
#table-body tr.drag-over-bot { box-shadow: 0 2px 0 var(--gold); }
.loc-wrapper { position: relative; display: flex; align-items: center; }
.loc-select { position: absolute; right: 2px; top: 50%; transform: translateY(-50%); background: rgba(201,169,110,0.12); border: none; border-radius: 3px; color: var(--gold); font-size: 10px; cursor: pointer; padding: 2px 3px; line-height: 1; opacity: 0; transition: opacity 0.15s; z-index: 2; }
tr:hover .loc-select { opacity: 1; }
.loc-select:hover { background: rgba(201,169,110,0.28); }
.btn-row-add { background: transparent; border: 1px dashed var(--border); color: var(--text-muted); padding: 7px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; margin-top: 10px; display: inline-block; }
.btn-row-add:hover { border-color: var(--gold); color: var(--gold); }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 26px 30px; width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.modal h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 17px; margin-bottom: 14px; }
.modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 10px 12px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; margin-bottom: 8px; }
.modal input:focus { border-color: var(--gold); }
.modal-btns { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.modal-btns button { padding: 9px 18px; border-radius: 5px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; }
.modal-btns .confirm { background: var(--gold); color: #1a1410; }
.modal-btns .cancel  { background: var(--surface2); color: var(--text-muted); }

/* ── TOAST ── */
#toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 16px; font-size: 13px; color: var(--text); box-shadow: 0 8px 24px rgba(0,0,0,0.4); transform: translateY(20px); opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 9999; display: flex; align-items: center; gap: 8px; }
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { border-color: var(--green); }
#toast.error   { border-color: var(--red); }

@media print {
  #sidebar, .topbar, .btn-row-add, .del-btn, .no-print { display: none !important; }
  #main { display: block; }
  #content-area { padding: 0; overflow: visible; }
  #pdf-area { background: white; border: none; padding: 8px; box-shadow: none; }
  table { font-size: 11px; }
  th { color: #333 !important; border-bottom: 2px solid #333 !important; }
  td { border-bottom: 1px solid #eee !important; }
  td input { color: #222 !important; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="brand-logo">THE H BRAND</div>

  </div>

    <button class="btn-add-year" onclick="openAddYearModal()">+ 연도 추가</button>

</div>

<!-- MAIN -->

            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>

          Google 계정으로 로그인

      </div>
    </div>

    <!-- 현장 목록 -->
    <div id="site-list-screen">
      <div class="list-header">
        <div>
          <div class="list-title" id="list-title">현장 목록</div>
          <div class="list-sub"   id="list-sub">좌측 사이드바에서 연도 / 월을 선택하세요</div>
        </div>

      <div class="site-grid" id="site-grid">
        <div class="state-box"><div class="icon">📂</div><p>좌측에서 연도 / 월을 선택하세요</p></div>
      </div>
    </div>

    <!-- 마감재 편집 -->
    <div id="edit-screen">
      <div id="pdf-area">
        <table>
          <thead>
            <tr>
              <th class="no-print" style="width:20px;"></th>
              <th style="width:30px;">#</th>
              <th style="width:13%;">위치 (실명)</th>
              <th style="width:14%;">항목 (구분)</th>
              <th style="width:43%;">상세 사양 (브랜드 / 모델 / 색상)</th>
              <th style="width:18%;">비고</th>
              <th class="no-print" style="width:36px;"></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <button class="btn-row-add no-print" onclick="addRow()">+ 행 추가</button>
      </div>
    </div>

  </div>
</div>

<!-- MODAL: 연도 -->
<div class="modal-overlay" id="year-modal">
  <div class="modal">
    <h3>연도 추가</h3>
    <input type="number" id="year-input" placeholder="예: 2027" min="2010" max="2040">
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal('year-modal')">취소</button>

      <button class="cancel" onclick="closeModal('site-modal')">취소</button>
      <button class="confirm" onclick="confirmAddSite()">추가</button>
    </div>
  </div>
</div>

<div id="toast"><span id="toast-icon">✓</span><span id="toast-msg"></span></div>

/* ── 로그인 ── */
function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { toast('로그인 오류: ' + resp.error, 'error'); return; }
      accessToken = resp.access_token;
      await afterSignIn();
    }
  });
}
function signIn() {
  if (!tokenClient) { toast('API 로드 중입니다. 잠시 후 다시 시도하세요.', 'error'); return; }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}
async function afterSignIn() {
  try {
    const u = await gFetch('https://www.googleapis.com/oauth2/v3/userinfo');
    document.getElementById('guser-name').textContent = u.name || u.email;
    document.getElementById('gavatar').src = u.picture || '';
    document.getElementById('guser-badge').style.display = 'flex';
  } catch(e) {}
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('btn-save').disabled = false;
  document.getElementById('btn-pdf').disabled = false;
  setSyncStatus('saving', '불러오는 중...');
  await loadFromDrive();
  renderNav();
  showSiteList(null, null);
  setSyncStatus('ok', '드라이브 연결됨');
  setTimeout(() => setSyncStatus('idle', '동기화 완료'), 2000);
  const latest = Object.keys(db).sort((a,b)=>b-a)[0];
  if (latest) setTimeout(() => openYear(latest), 80);
}
function signOut() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  google.accounts.oauth2.revoke(accessToken, ()=>{});
  accessToken = null; driveFileId = null; db = {};
  curY = curM = curSiteId = null; unsaved = false;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('site-list-screen').style.display = 'none';
  document.getElementById('edit-screen').style.display = 'none';
  document.getElementById('guser-badge').style.display = 'none';
  document.getElementById('btn-save').disabled = true;
  document.getElementById('btn-pdf').disabled = true;
  document.getElementById('btn-back').style.display = 'none';
  document.getElementById('nav-list').innerHTML = '<div class="state-box" style="height:100px;"><p style="font-size:11px;">로그인 후 사용 가능</p></div>';
  setSyncStatus('idle', '대기 중');
}

/* ── Drive ── */
async function gFetch(url, options={}) {
  const res = await fetch(url, { ...options, headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json', ...(options.headers||{}) } });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return {};
  return res.json();
}
async function loadFromDrive() {
  try {
    const list = await gFetch(`https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}' and trashed=false&spaces=drive&fields=files(id,name)`);
    if (list.files && list.files.length > 0) {
      driveFileId = list.files[0].id;
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, { headers: { 'Authorization': 'Bearer ' + accessToken } });
      const loaded = await res.json();
      // 드라이브 데이터와 초기 데이터 병합 (드라이브 우선)
      Object.keys(db).forEach(y => {
        if (!loaded[y]) loaded[y] = {};
        Object.keys(db[y]).forEach(m => {
          if (!loaded[y][m] || !(loaded[y][m].sites && loaded[y][m].sites.length)) {
            loaded[y][m] = db[y][m];
          }
        });
      });
      db = loaded;
      migrateDB();
      toast('드라이브에서 불러왔습니다 ✓', 'success');
    } else {
      // 드라이브에 파일 없음 → 초기 데이터 그대로 저장
      await saveToDrive();
      toast('현장 데이터를 드라이브에 저장했습니다 ✓', 'success');
    }
  } catch(e) {
    toast('불러오기 오류: ' + e.message, 'error');
  }
}
function migrateDB() {
  // 구버전(name+items) → 신버전(sites 배열) 자동 변환
  Object.keys(db).forEach(y => {
    Object.keys(db[y]).forEach(m => {
      const v = db[y][m];
      if (v && !v.sites) {
        db[y][m] = { sites: (v.name || (v.items && v.items.length)) ? [{ id: uid(), name: v.name||'기존 현장', addr:'', items: v.items||[], savedAt: v.savedAt||'', savedBy: v.savedBy||'' }] : [] };
      }
    });
  });
}
async function saveToDrive() {
  const body = JSON.stringify(db, null, 2);
  let res;
  if (driveFileId) {
    res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
      method: 'PATCH', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body
    });
  } else {
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({ name: DRIVE_FILE_NAME, mimeType: 'application/json' })], { type: 'application/json' }));
    form.append('file', new Blob([body], { type: 'application/json' }));
    res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken }, body: form
    });
    driveFileId = (await res.json()).id;
    return;
  }
  if (!res.ok) {
    const errText = await res.text();
    if (res.status === 401) { toast('로그인이 만료됐습니다. 다시 로그인해주세요.', 'error'); accessToken = null; }
    throw new Error('Drive 저장 실패: ' + errText);
  }
}

function renderNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = '';
  Object.keys(db).sort((a,b)=>b-a).forEach(y => {
    const isOpen = curY === y;
    const block = document.createElement('div');
    block.className = 'year-block';
    block.innerHTML = `<div class="year-label ${isOpen?'open':''}" id="yl-${y}" onclick="toggleYear('${y}')"><span>📂 ${y}년</span><span class="arrow">▶</span></div><div class="month-list ${isOpen?'open':''}" id="ml-${y}"></div>`;
    nav.appendChild(block);
    const mList = document.getElementById(`ml-${y}`);
    ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'].forEach(m => {
      const cnt = (db[y]?.[m]?.sites||[]).length;
      const el = document.createElement('div');
      el.className = `month-item ${curY===y&&curM===m?'active':''}`;
      el.innerHTML = `${m}${cnt>0?'<span class="has-dot"></span>':''}`;
      el.onclick = () => showSiteList(y, m);
      mList.appendChild(el);
    });
  });
}

function getSite(y, m, id) { return (db[y]?.[m]?.sites||[]).find(s => s.id === id); }

function addSiteModal() {
  if (!curY || !curM) { toast('먼저 연도/월을 선택하세요.', 'error'); return; }
  document.getElementById('site-name-input').value = '';
  document.getElementById('site-addr-input').value = '';
  document.getElementById('site-modal').classList.add('open');
  setTimeout(() => document.getElementById('site-name-input').focus(), 80);
}

async function confirmAddSite() {
  const name = document.getElementById('site-name-input').value.trim();
  const addr = document.getElementById('site-addr-input').value.trim();
  if (!name) { alert('현장명을 입력하세요.'); return; }
  if (!db[curY]) db[curY] = {};
  if (!db[curY][curM]) db[curY][curM] = { sites: [] };
  if (!db[curY][curM].sites) db[curY][curM].sites = [];
  const newSite = { id: uid(), name, addr, items: [], savedAt: '', savedBy: '' };
  db[curY][curM].sites.push(newSite);
  closeModal('site-modal');
  try { await saveToDrive(); toast(`"${name}" 현장 추가 완료 ✓`, 'success'); } catch(e) { toast('저장 오류: ' + e.message, 'error'); }
  renderNav(); renderSiteGrid();
}

async function deleteSite(e, siteId) {
  e.stopPropagation();
  const site = getSite(curY, curM, siteId);
  if (!site || !confirm(`"${site.name}" 현장을 삭제하시겠습니까?\n마감재 데이터도 함께 삭제됩니다.`)) return;
  db[curY][curM].sites = db[curY][curM].sites.filter(s => s.id !== siteId);
  try { await saveToDrive(); toast('현장이 삭제됐습니다.', 'success'); } catch(e) { toast('삭제 오류', 'error'); }
  renderNav(); renderSiteGrid();
}

/* ── TABLE ── */
function renderTable(items) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  if (items.length === 0) addRow(); else items.forEach(r => addRow(r));
  updateNums();
}
const LOC_OPTIONS = ['거실','안방','주방','수납','공용욕실','안방욕실','현관','베란다','아이방','서재방'];

function addRow(data={}) {
  const tbody = document.getElementById('table-body');
  const tr = document.createElement('tr');
  tr.draggable = true;
  const locVal = esc(data.loc||'');
  tr.innerHTML = `
    <td class="drag-handle no-print" title="드래그하여 순서 변경">⠿</td>
    <td><span class="row-num">-</span></td>
    <td>
      <div class="loc-wrapper">
        <input class="cell-loc" value="${locVal}" placeholder="예: 거실" style="padding-right:22px;">
        <button class="loc-select no-print" title="위치 선택" onclick="openLocPicker(this)">▾</button>
      </div>
    </td>
    <td><input class="cell-part" value="${esc(data.part||'')}" placeholder="예: 바닥재"></td>
    <td><input class="cell-spec" value="${esc(data.spec||'')}" placeholder="예: LX하우시스 강마루 HU-831"></td>
    <td><input class="cell-note" value="${esc(data.note||'')}" placeholder="수량·특이사항"></td>
    <td class="no-print"><button class="del-btn" onclick="delRow(this)">×</button></td>
  `;
  tr.querySelectorAll('input').forEach(i => i.addEventListener('input', markUnsaved));
  initDragRow(tr);
  tbody.appendChild(tr);
  updateNums();
}

/* ── 위치 드롭다운 피커 ── */
let _locPicker = null;
function openLocPicker(btn) {
  if (_locPicker) { _locPicker.remove(); _locPicker = null; return; }
  const input = btn.closest('.loc-wrapper').querySelector('.cell-loc');
  const rect  = btn.getBoundingClientRect();
  const menu  = document.createElement('div');
  menu.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.bottom+2}px;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:9000;min-width:120px;overflow:hidden;`;
  LOC_OPTIONS.forEach(opt => {
    const item = document.createElement('div');
    item.textContent = opt;
    item.style.cssText = 'padding:8px 14px;font-size:13px;cursor:pointer;color:var(--text);transition:background 0.1s;';
    item.onmouseenter = () => item.style.background = 'rgba(201,169,110,0.12)';
    item.onmouseleave = () => item.style.background = '';
    item.onclick = () => { input.value = opt; markUnsaved(); closePicker(); };
    menu.appendChild(item);
  });
  const direct = document.createElement('div');
  direct.textContent = '✏ 직접입력';
  direct.style.cssText = 'padding:8px 14px;font-size:13px;cursor:pointer;color:var(--gold);border-top:1px solid var(--border);transition:background 0.1s;';
  direct.onmouseenter = () => direct.style.background = 'rgba(201,169,110,0.08)';
  direct.onmouseleave = () => direct.style.background = '';
  direct.onclick = () => { input.focus(); input.select(); closePicker(); };
  menu.appendChild(direct);
  document.body.appendChild(menu);
  _locPicker = menu;
  setTimeout(() => document.addEventListener('click', closePicker, {once:true}), 10);
}
function closePicker() { if(_locPicker){_locPicker.remove();_locPicker=null;} }
function delRow(btn) { btn.closest('tr').remove(); updateNums(); markUnsaved(); }

/* ── DRAG & DROP 순서 변경 ── */
let _dragSrc = null;
function initDragRow(tr) {
  tr.addEventListener('dragstart', e => {
    _dragSrc = tr;
    tr.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  tr.addEventListener('dragend', () => {
    _dragSrc = null;
    tr.classList.remove('dragging');
    document.querySelectorAll('#table-body tr').forEach(r => r.classList.remove('drag-over-top','drag-over-bot'));
    updateNums();
    markUnsaved();
  });
  tr.addEventListener('dragover', e => {
    e.preventDefault();
    if (!_dragSrc || _dragSrc === tr) return;
    document.querySelectorAll('#table-body tr').forEach(r => r.classList.remove('drag-over-top','drag-over-bot'));
    const rect = tr.getBoundingClientRect();
    tr.classList.add(e.clientY < rect.top + rect.height/2 ? 'drag-over-top' : 'drag-over-bot');
  });
  tr.addEventListener('dragleave', () => tr.classList.remove('drag-over-top','drag-over-bot'));
  tr.addEventListener('drop', e => {
    e.preventDefault();
    if (!_dragSrc || _dragSrc === tr) return;
    const rect = tr.getBoundingClientRect();
    if (e.clientY < rect.top + rect.height/2) tr.parentNode.insertBefore(_dragSrc, tr);
    else tr.parentNode.insertBefore(_dragSrc, tr.nextSibling);
    tr.classList.remove('drag-over-top','drag-over-bot');
  });
}

function updateNums() { document.querySelectorAll('#table-body tr').forEach((tr,i) => { const s=tr.querySelector('.row-num'); if(s) s.textContent=i+1; }); }
/* ── 자동저장 (입력 멈춘 후 3초) ── */
let _autoSaveTimer = null;
function markUnsaved() {
  unsaved = true;
  setSyncStatus('saving', '미저장 변경');
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(() => {
    if (unsaved && curSiteId) saveData(true);
  }, 3000);
}

/* ── SAVE ── */
async function saveData(isAuto = false) {
  if (!curSiteId) { if (!isAuto) toast('저장할 현장을 선택하세요.', 'error'); return; }
  if (!accessToken) { toast('로그인이 만료됐습니다. 다시 로그인해주세요.', 'error'); return; }
  setSyncStatus('saving', isAuto ? '자동저장 중...' : '저장 중...');
  const rows  = document.querySelectorAll('#table-body tr');
  const items = Array.from(rows).map(tr => ({
    loc:  tr.querySelector('.cell-loc')?.value  || '',
    part: tr.querySelector('.cell-part')?.value || '',
    spec: tr.querySelector('.cell-spec')?.value || '',
    note: tr.querySelector('.cell-note')?.value || ''
  }));
  const site = getSite(curY, curM, curSiteId);
  if (!site) return;
  site.items   = items;
  site.savedAt = new Date().toISOString();
  site.savedBy = document.getElementById('guser-name').textContent;
  try {
    await saveToDrive();
    unsaved = false;
    setSyncStatus('ok', isAuto ? '자동저장 완료 ✓' : '드라이브 저장 완료');
    if (!isAuto) toast(`"${site.name}" 저장 완료 ✓`, 'success');
    setTimeout(() => setSyncStatus('idle', '동기화 완료'), 3000);
  } catch(e) {
    setSyncStatus('err', '저장 오류');
    toast('저장 오류: ' + e.message, 'error');
  }
}

/* ── PDF ── */
function downloadPDF() {
  if (!curSiteId) { toast('현장을 선택하세요.', 'error'); return; }
  const site = getSite(curY, curM, curSiteId);
  html2pdf().set({ margin:[8,6,8,6], filename:`${site?.name||'마감재'}_${curY}_${curM}.pdf`, html2canvas:{scale:2,backgroundColor:'#ffffff'}, jsPDF:{unit:'mm',format:'a4',orientation:'landscape'} }).from(document.getElementById('pdf-area')).save();
}

/* ── 연도 추가 ── */
function openAddYearModal() {
  if (!accessToken) { toast('로그인 후 사용 가능합니다.', 'error'); return; }
  document.getElementById('year-modal').classList.add('open');
  setTimeout(() => document.getElementById('year-input').focus(), 80);
}
async function confirmAddYear() {
  const y = String(document.getElementById('year-input').value).trim();
  if (!y || isNaN(y) || +y<2010 || +y>2045) { alert('유효한 연도(2010~2045)를 입력하세요.'); return; }
  if (db[y]) { alert('이미 존재하는 연도입니다.'); return; }
  db[y] = {};
  closeModal('year-modal');
  try { await saveToDrive(); toast(`${y}년 추가 완료`, 'success'); } catch(e) {}
  renderNav();
  setTimeout(() => openYear(y), 80);
}

/* ── MODAL ── */
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
['year-modal','site-modal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => { if (e.target===document.getElementById(id)) closeModal(id); });
});
document.getElementById('year-input').addEventListener('keydown', e => { if(e.key==='Enter') confirmAddYear(); if(e.key==='Escape') closeModal('year-modal'); });
document.getElementById('site-name-input').addEventListener('keydown', e => { if(e.key==='Enter') confirmAddSite(); if(e.key==='Escape') closeModal('site-modal'); });

/* ── SYNC / TOAST / UTIL ── */
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  dot.className = 'sync-dot';
  if (state==='saving') dot.classList.add('saving');
  else if (state==='ok')  dot.classList.add('ok');
  else if (state==='err') dot.classList.add('err');
  document.getElementById('sync-text').textContent = label||'대기 중';
}
let _tt;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.className = 'show ' + type;
  document.getElementById('toast-icon').textContent = type==='success'?'✓':'⚠';
  document.getElementById('toast-msg').textContent  = msg;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3200);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function uid()  { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveData(); } });

window.onload = () => {
  gapi.load('client', () => {
    gapi.client.init({ discoveryDocs: [] }).then(() => {
      google.accounts.id.initialize({ client_id: CLIENT_ID });
      initGIS();
    });
  });
};
</script>
