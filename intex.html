<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DH Brand | 마감재 리스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- Google API -->
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<style>
:root {
  --bg: #1a1410;
  --surface: #231e18;
  --surface2: #2d2620;
  --border: #3d3530;
  --gold: #c9a96e;
  --gold-light: #e4c99a;
  --cream: #f5f0e8;
  --text: #e8ddd0;
  --text-muted: #8a7968;
  --red: #c0392b;
  --green: #2ecc71;
  --sidebar-w: 240px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 22px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.brand-logo {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  color: var(--gold);
  letter-spacing: 1px;
}
.brand-sub {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 3px;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.year-block { margin-bottom: 2px; }
.year-label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 18px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--gold);
  text-transform: uppercase;
  transition: background 0.15s;
}
.year-label:hover { background: rgba(201,169,110,0.06); }
.year-label .arrow { font-size: 10px; transition: transform 0.2s; }
.year-label.open .arrow { transform: rotate(90deg); }
.month-list { display: none; }
.month-list.open { display: block; }
.month-item {
  padding: 7px 18px 7px 34px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-muted);
  transition: all 0.15s;
  border-left: 2px solid transparent;
  margin-left: 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.month-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.month-item.active {
  color: var(--gold-light);
  border-left-color: var(--gold);
  background: rgba(201,169,110,0.08);
  font-weight: 500;
}
.has-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.btn-side {
  width: 100%;
  padding: 8px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 500;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  border: none;
}
.btn-add-year {
  background: rgba(201,169,110,0.1);
  border: 1px solid rgba(201,169,110,0.3) !important;
  color: var(--gold);
}
.btn-add-year:hover { background: rgba(201,169,110,0.18); }

/* ── MAIN ── */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  gap: 16px;
  flex-shrink: 0;
}
.topbar-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.current-label {
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
#project-name-input {
  background: transparent;
  border: none;
  outline: none;
  font-size: 19px;
  font-family: 'Playfair Display', serif;
  color: var(--cream);
  width: 380px;
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
  transition: border-color 0.2s;
}
#project-name-input:focus { border-bottom-color: var(--gold); }
#project-name-input::placeholder { color: var(--text-muted); font-style: italic; }
.topbar-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

/* sync badge */
.sync-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  padding: 5px 10px;
  background: var(--surface2);
  border-radius: 4px;
  white-space: nowrap;
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s;
  flex-shrink: 0;
}
.sync-dot.saving { background: #f39c12; animation: blink 0.7s infinite; }
.sync-dot.ok     { background: var(--green); }
.sync-dot.err    { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Google 계정 */
.guser-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 10px;
  background: var(--surface2);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  transition: background 0.2s;
}
.guser-badge:hover { background: var(--border); }
.gavatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--border);
  object-fit: cover;
}

.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 500;
  transition: all 0.2s;
  letter-spacing: 0.3px;
  white-space: nowrap;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-save { background: var(--gold); color: #1a1410; }
.btn-save:hover:not(:disabled) { background: var(--gold-light); }
.btn-pdf  { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
.btn-pdf:hover:not(:disabled)  { background: rgba(201,169,110,0.12); }

/* ── CONTENT ── */
#content-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
}
#content-area::-webkit-scrollbar { width: 6px; }
#content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── LOGIN SCREEN ── */
#login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 20px;
  text-align: center;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 48px 56px;
  max-width: 420px;
  width: 100%;
}
.login-logo {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  color: var(--gold);
  margin-bottom: 6px;
}
.login-sub {
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.login-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 28px;
}
#g-signin-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: white;
  color: #3c4043;
  border: 1px solid #dadce0;
  border-radius: 6px;
  padding: 11px 20px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 500;
  cursor: pointer;
  width: 100%;
  transition: box-shadow 0.2s;
}
#g-signin-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
.g-icon { width: 18px; height: 18px; }

/* ── EMPTY STATE ── */
.state-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 280px;
  color: var(--text-muted);
  gap: 10px;
}
.state-box .icon { font-size: 36px; }
.state-box p { font-size: 14px; }

/* ── TABLE ── */
#pdf-area {
  background: var(--surface);
  border-radius: 8px;
  border: 1px solid var(--border);
  padding: 20px;
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { border-bottom: 2px solid var(--gold); }
th {
  text-align: left;
  padding: 10px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--gold);
}
td { border-bottom: 1px solid var(--border); padding: 2px 3px; vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,0.015); }
td input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  padding: 7px 7px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text);
  border-radius: 3px;
  transition: background 0.15s;
}
td input:focus { background: rgba(201,169,110,0.06); }
td input::placeholder { color: #5a5040; }
.row-num { color: var(--text-muted); font-size: 11px; text-align: center; padding: 7px 6px; user-select: none; }
.del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 16px;
  padding: 4px 8px; border-radius: 3px;
  transition: all 0.15s; line-height: 1;
}
.del-btn:hover { color: var(--red); background: rgba(192,57,43,0.1); }
.btn-row-add {
  background: transparent;
  border: 1px dashed var(--border);
  color: var(--text-muted);
  padding: 7px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
  margin-top: 10px;
  display: inline-block;
}
.btn-row-add:hover { border-color: var(--gold); color: var(--gold); }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 28px 32px;
  width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal h3 {
  font-family: 'Playfair Display', serif;
  color: var(--gold); font-size: 18px; margin-bottom: 16px;
}
.modal input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 10px 12px;
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.modal input:focus { border-color: var(--gold); }
.modal-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal-btns button {
  padding: 9px 20px; border-radius: 5px; border: none;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px; font-weight: 500;
}
.modal-btns .confirm { background: var(--gold); color: #1a1410; }
.modal-btns .cancel  { background: var(--surface2); color: var(--text-muted); }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 18px;
  font-size: 13px;
  color: var(--text);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  transform: translateY(20px);
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 8px;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.success { border-color: var(--green); }
#toast.error   { border-color: var(--red); }

/* ── PRINT ── */
@media print {
  #sidebar, .topbar, .btn-row-add, .del-btn, .no-print { display: none !important; }
  #main { display: block; }
  #content-area { padding: 0; overflow: visible; }
  #pdf-area { background: white; border: none; padding: 8px; box-shadow: none; }
  table { font-size: 11px; }
  th { color: #333 !important; border-bottom: 2px solid #333 !important; }
  td { border-bottom: 1px solid #eee !important; }
  td input { color: #222 !important; }
  .row-num { color: #999 !important; }
}
</style>
</head>
<body>

<!-- ═══ SIDEBAR ═══ -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="brand-logo">THE H BRAND</div>
    <div class="brand-sub">마감재 리스트</div>
  </div>
  <div class="sidebar-nav" id="nav-list">
    <div class="state-box" style="height:120px;"><p style="font-size:12px;">로그인 후 사용 가능</p></div>
  </div>
  <div class="sidebar-footer">
    <button class="btn-side btn-add-year" onclick="openAddYearModal()">+ 연도 추가</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="main">
  <!-- 상단바 -->
  <div class="topbar no-print">
    <div class="topbar-left">
      <span class="current-label" id="current-label">연도 / 월을 선택하세요</span>
      <input type="text" id="project-name-input" placeholder="현장명 입력">
    </div>
    <div class="topbar-right">
      <div class="sync-badge">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-text">대기 중</span>
      </div>
      <div class="guser-badge" id="guser-badge" style="display:none;" onclick="signOut()">
        <img class="gavatar" id="gavatar" src="" alt="">
        <span id="guser-name">-</span>
        <span style="font-size:9px;opacity:0.5;">로그아웃</span>
      </div>
      <button class="btn btn-save" id="btn-save" onclick="saveData()" disabled>저장하기</button>
      <button class="btn btn-pdf"  id="btn-pdf"  onclick="downloadPDF()" disabled>PDF 저장</button>
    </div>
  </div>

  <!-- 컨텐츠 -->
  <div id="content-area">

    <!-- 로그인 화면 -->
    <div id="login-screen">
      <div class="login-card">
        <div class="login-logo">THE H BRAND</div>
        <div class="login-sub">마감재 리스트 관리</div>
        <p class="login-desc">
          구글 계정으로 로그인하면<br>
          팀원 전체가 <strong style="color:var(--gold);">동일한 구글 드라이브 파일</strong>을<br>
          실시간으로 열람·수정할 수 있습니다.
        </p>
        <button id="g-signin-btn" onclick="signIn()">
          <svg class="g-icon" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Google 계정으로 로그인
        </button>
      </div>
    </div>

    <!-- 앱 화면 -->
    <div id="app-screen" style="display:none;">
      <div class="state-box" id="empty-state">
        <div class="icon">📂</div>
        <p>좌측에서 연도 / 월을 선택하세요</p>
      </div>
      <div id="pdf-area" style="display:none;">
        <table>
          <thead>
            <tr>
              <th style="width:32px;">#</th>
              <th style="width:13%;">위치 (실명)</th>
              <th style="width:14%;">항목 (구분)</th>
              <th style="width:43%;">상세 사양 (브랜드 / 모델 / 색상)</th>
              <th style="width:18%;">비고</th>
              <th class="no-print" style="width:38px;"></th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <button class="btn-row-add no-print" onclick="addRow()">+ 행 추가</button>
      </div>
    </div>

  </div>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="year-modal">
  <div class="modal">
    <h3>연도 추가</h3>
    <input type="number" id="year-input" placeholder="예: 2027" min="2010" max="2040">
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal()">취소</button>
      <button class="confirm" onclick="confirmAddYear()">추가</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast">
  <span id="toast-icon">✓</span>
  <span id="toast-msg"></span>
</div>

<script>
/* ════════════════════════════════════════════
   ★ 설정 — 아래 2가지만 바꾸면 됩니다
   ════════════════════════════════════════════ */
const CLIENT_ID   = 'YOUR_GOOGLE_CLIENT_ID';   // Google Cloud Console에서 발급
const DRIVE_FILE_NAME = 'dh_finishing_list.json'; // 드라이브에 저장될 파일명 (변경 금지 권장)
/* ════════════════════════════════════════════ */

const SCOPES = 'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file';
let tokenClient, accessToken = null;
let db = {};           // 전체 데이터
let driveFileId = null; // 기존 파일 ID
let curY = null, curM = null;
let unsaved = false;

/* ── Google Identity ── */
function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { toast('로그인 오류: ' + resp.error, 'error'); return; }
      accessToken = resp.access_token;
      await afterSignIn();
    }
  });
}

function signIn() {
  if (!tokenClient) { toast('Google API가 아직 로드 중입니다. 잠시 후 다시 시도하세요.', 'error'); return; }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

async function afterSignIn() {
  // 사용자 프로필
  try {
    const r = await gFetch('https://www.googleapis.com/oauth2/v3/userinfo');
    document.getElementById('guser-name').textContent = r.name || r.email;
    document.getElementById('gavatar').src = r.picture || '';
    document.getElementById('guser-badge').style.display = 'flex';
  } catch(e) {}

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('btn-save').disabled = false;
  document.getElementById('btn-pdf').disabled = false;

  setSyncStatus('saving', '불러오는 중...');
  await loadFromDrive();
  renderNav();
  setSyncStatus('ok', '드라이브 연결됨');
  setTimeout(() => setSyncStatus('idle', '동기화 완료'), 2000);

  // 최신 연도 자동 펼침
  const latest = Object.keys(db).sort((a,b)=>b-a)[0];
  if (latest) setTimeout(() => openYear(latest), 80);
}

function signOut() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null;
  driveFileId = null;
  db = {};
  curY = curM = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('guser-badge').style.display = 'none';
  document.getElementById('btn-save').disabled = true;
  document.getElementById('btn-pdf').disabled = true;
  document.getElementById('nav-list').innerHTML = '<div class="state-box" style="height:120px;"><p style="font-size:12px;">로그인 후 사용 가능</p></div>';
  setSyncStatus('idle', '대기 중');
}

/* ── Google Drive API ── */
async function gFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      'Authorization': 'Bearer ' + accessToken,
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  if (res.status === 204) return {};
  return res.json();
}

// 드라이브에서 JSON 불러오기
async function loadFromDrive() {
  try {
    // 기존 파일 찾기
    const list = await gFetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FILE_NAME}' and trashed=false&spaces=drive&fields=files(id,name,modifiedTime)`
    );
    if (list.files && list.files.length > 0) {
      driveFileId = list.files[0].id;
      const content = await fetch(
        `https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`,
        { headers: { 'Authorization': 'Bearer ' + accessToken } }
      );
      db = await content.json();
      toast('드라이브에서 불러왔습니다 ✓', 'success');
    } else {
      // 파일 없으면 기본값 생성
      db = { "2024": {}, "2025": {}, "2026": {} };
      await saveToDrive();
      toast('새 파일을 드라이브에 생성했습니다', 'success');
    }
  } catch(e) {
    toast('불러오기 오류: ' + e.message, 'error');
    db = { "2024": {}, "2025": {}, "2026": {} };
  }
}

// 드라이브에 JSON 저장
async function saveToDrive() {
  const body = JSON.stringify(db, null, 2);
  const blob = new Blob([body], { type: 'application/json' });
  let res;
  if (driveFileId) {
    // 기존 파일 업데이트
    res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`, {
      method: 'PATCH',
      headers: {
        'Authorization': 'Bearer ' + accessToken,
        'Content-Type': 'application/json'
      },
      body
    });
  } else {
    // 신규 파일 생성 (멀티파트)
    const meta = JSON.stringify({ name: DRIVE_FILE_NAME, mimeType: 'application/json' });
    const form = new FormData();
    form.append('metadata', new Blob([meta], { type: 'application/json' }));
    form.append('file', blob);
    res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + accessToken },
      body: form
    });
    const json = await res.json();
    driveFileId = json.id;
  }
  if (!res.ok) throw new Error('Drive 저장 실패');
}

/* ── NAV ── */
function renderNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = '';
  const years = Object.keys(db).sort((a,b) => b-a);
  years.forEach(y => {
    const block = document.createElement('div');
    block.className = 'year-block';
    const isOpen = curY === y;
    block.innerHTML = `
      <div class="year-label ${isOpen?'open':''}" id="yl-${y}" onclick="toggleYear('${y}')">
        <span>📂 ${y}년</span><span class="arrow">▶</span>
      </div>
      <div class="month-list ${isOpen?'open':''}" id="ml-${y}"></div>
    `;
    nav.appendChild(block);
    const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const mList = document.getElementById(`ml-${y}`);
    MONTHS.forEach(m => {
      const hasData = db[y][m] && (db[y][m].items||[]).length > 0;
      const el = document.createElement('div');
      el.className = `month-item ${curY===y&&curM===m?'active':''}`;
      el.innerHTML = `${m}${hasData?'<span class="has-dot"></span>':''}`;
      el.onclick = () => loadPage(y, m);
      mList.appendChild(el);
    });
  });
}

function toggleYear(y) {
  document.getElementById(`ml-${y}`)?.classList.toggle('open');
  document.getElementById(`yl-${y}`)?.classList.toggle('open');
}
function openYear(y) {
  document.getElementById(`ml-${y}`)?.classList.add('open');
  document.getElementById(`yl-${y}`)?.classList.add('open');
}

/* ── PAGE ── */
function loadPage(y, m) {
  if (unsaved && !confirm('저장하지 않은 변경사항이 있습니다. 이동하시겠습니까?')) return;
  unsaved = false;
  curY = y; curM = m;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('pdf-area').style.display = 'block';
  document.getElementById('current-label').textContent = `${y}년 ${m}`;

  const pg = db[y]?.[m] || { name: '', items: [] };
  document.getElementById('project-name-input').value = pg.name || '';
  renderTable(pg.items || []);
  renderNav();
  setSyncStatus('idle', '동기화 완료');
}

/* ── TABLE ── */
function renderTable(items) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  if (items.length === 0) addRow();
  else items.forEach(r => addRow(r));
  updateNums();
}

function addRow(data = {}) {
  const tbody = document.getElementById('table-body');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><span class="row-num">-</span></td>
    <td><input class="cell-loc"  value="${esc(data.loc||'')}"  placeholder="예: 거실"></td>
    <td><input class="cell-part" value="${esc(data.part||'')}" placeholder="예: 바닥재"></td>
    <td><input class="cell-spec" value="${esc(data.spec||'')}" placeholder="예: LX하우시스 강마루 HU-831"></td>
    <td><input class="cell-note" value="${esc(data.note||'')}" placeholder="수량·특이사항"></td>
    <td class="no-print"><button class="del-btn" onclick="delRow(this)">×</button></td>
  `;
  tr.querySelectorAll('input').forEach(i => i.addEventListener('input', markUnsaved));
  tbody.appendChild(tr);
  updateNums();
}

function delRow(btn) {
  btn.closest('tr').remove();
  updateNums();
  markUnsaved();
}

function updateNums() {
  document.querySelectorAll('#table-body tr').forEach((tr, i) => {
    const s = tr.querySelector('.row-num');
    if (s) s.textContent = i + 1;
  });
}

function markUnsaved() {
  unsaved = true;
  setSyncStatus('saving', '미저장 변경');
  document.getElementById('sync-dot').classList.remove('saving');
  document.getElementById('sync-dot').style.background = '#f39c12';
}

/* ── SAVE ── */
async function saveData() {
  if (!curY || !curM) { toast('저장할 월을 선택하세요.', 'error'); return; }
  if (!accessToken)   { toast('로그인이 필요합니다.', 'error'); return; }

  setSyncStatus('saving', '저장 중...');
  const rows = document.querySelectorAll('#table-body tr');
  const items = Array.from(rows).map(tr => ({
    loc:  tr.querySelector('.cell-loc')?.value  || '',
    part: tr.querySelector('.cell-part')?.value || '',
    spec: tr.querySelector('.cell-spec')?.value || '',
    note: tr.querySelector('.cell-note')?.value || '',
  }));
  if (!db[curY]) db[curY] = {};
  db[curY][curM] = {
    name: document.getElementById('project-name-input').value,
    items,
    savedAt: new Date().toISOString(),
    savedBy: document.getElementById('guser-name').textContent
  };

  try {
    await saveToDrive();
    unsaved = false;
    setSyncStatus('ok', '구글 드라이브 저장 완료');
    toast(`${curY}년 ${curM} 저장 완료 ✓`, 'success');
    renderNav();
    setTimeout(() => setSyncStatus('idle', '동기화 완료'), 3000);
  } catch(e) {
    setSyncStatus('err', '저장 오류');
    toast('저장 오류: ' + e.message, 'error');
  }
}

/* ── PDF ── */
function downloadPDF() {
  if (!curY || !curM) { toast('PDF로 저장할 월을 선택하세요.', 'error'); return; }
  const el  = document.getElementById('pdf-area');
  const name = document.getElementById('project-name-input').value || '마감재리스트';
  html2pdf().set({
    margin: [8, 6, 8, 6],
    filename: `${name}_${curY}_${curM}.pdf`,
    html2canvas: { scale: 2, backgroundColor: '#ffffff', useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
  }).from(el).save();
}

/* ── ADD YEAR ── */
function openAddYearModal() {
  if (!accessToken) { toast('로그인 후 사용 가능합니다.', 'error'); return; }
  document.getElementById('year-modal').classList.add('open');
  setTimeout(() => document.getElementById('year-input').focus(), 80);
}
function closeModal() { document.getElementById('year-modal').classList.remove('open'); }
async function confirmAddYear() {
  const y = String(document.getElementById('year-input').value).trim();
  if (!y || isNaN(y) || +y < 2010 || +y > 2045) { alert('유효한 연도(2010~2045)를 입력하세요.'); return; }
  if (db[y]) { alert('이미 존재하는 연도입니다.'); return; }
  db[y] = {};
  closeModal();
  try {
    await saveToDrive();
    toast(`${y}년 추가 및 저장 완료`, 'success');
  } catch(e) {}
  renderNav();
  setTimeout(() => openYear(y), 80);
}
document.getElementById('year-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAddYear();
  if (e.key === 'Escape') closeModal();
});
document.getElementById('year-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('year-modal')) closeModal();
});

/* ── SYNC STATUS ── */
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sync-dot';
  dot.style.background = '';
  if (state === 'saving') dot.classList.add('saving');
  else if (state === 'ok')  dot.classList.add('ok');
  else if (state === 'err') dot.classList.add('err');
  txt.textContent = label || '대기 중';
}

/* ── TOAST ── */
let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  const ic = document.getElementById('toast-icon');
  const ms = document.getElementById('toast-msg');
  el.className = 'show ' + type;
  ic.textContent = type === 'success' ? '✓' : '⚠';
  ms.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3000);
}

/* ── UTIL ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveData(); }
});

/* ── INIT ── */
window.onload = () => {
  gapi.load('client', () => {
    gapi.client.init({ discoveryDocs: [] }).then(() => {
      google.accounts.id.initialize({ client_id: CLIENT_ID });
      initGIS();
    });
  });
};
